<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolognese sauce is pretty nice. its also the inspiration for my full username "bowlofneighs" as "bowlofneighs" is almost a homophone of bolognese. bowlofneighs is pronounced bowl of neighs (like the sound a horse makes), but bolognese is pronounced b
     │ owl uh neighs, not bowl of neighs</title>
    <script src="https://cdn.tailwindcss.com"></script> <!--imports tailwindcss-->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- the next couple lines are for google fonts, it has Inter, Josefin Sans, and Playwrite DE SAS-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Playwrite+DE+SAS:wght@100..400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- imports the style.css file we have-->
</head>
<body>
    <div class="min-h-screen bg-[#1e1e2e]"> <!-- the greeting will be contained in this div-->
        <div class="fixed top-0 text-[#b4befe] pl-16" id="greeting"> <!--the fixed div needs to be contained inside the other div so that it will scroll away-->
            <div class="flex gap-4 pt-[300px]">
                <h1 class="text-9xl pt-16 pl-16"> <!--has the "Hi," text in it-->
                    Hi,
                </h1>
                <h4 class="pt-[165px] text-4xl">
                    I'm Bowl.
                </h4>
            </div>
            <p class="pt-7 pl-16 text-[#caa5f7] font-[Josefin_Sans] text-2xl italic">
                And I <span class="font-black">love</span> linux
            </p>
        </div>
        <div id="scroll-arrow" class="fixed bottom-8 left-1/2 -translate-x-1/2 opacity-0 cursor-pointer transition-opacity duration-1000 text-[#ffffff] text-7xl font-[Comfortaa]">
            ↓ <!-- impossible to see but theres a downward pointing arrow unicode symbol there-->
        </div>
    </div>
    <div class="min-h-screen bg-white z-10">
        <p>
            brutalist goes here
        </p>
    </div>

    <script src="glitch.js"></script>
    <script src="scroll_arrow.js"></script>
</body>
</html>
